{{ define "main" }}
<section class="section-page">
  <h1>{{ .Title }}</h1>
  <p class="subtitle">{{ len .Site.Data.fcc_devices }} FCC-certified IoT devices.</p>
  <table>
    <thead>
      <tr><th>FCC ID</th><th>Device</th><th>Grantee</th><th>Frequency</th><th>Date</th></tr>
    </thead>
    <tbody>
      {{ range .Site.Data.fcc_devices }}
      <tr>
        <td><a href="{{ .url }}" target="_blank" rel="noopener">{{ .fcc_id }}</a></td>
        <td>{{ .title }}</td>
        <td>{{ .grantee }}</td>
        <td>{{ .frequency }}</td>
        <td>{{ .date }}</td>
      </tr>
      {{ end }}
    </tbody>
  </table>
</section>
{{ end }}
