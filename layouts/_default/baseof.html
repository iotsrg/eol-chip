<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "nav.html" . }}
  <main class="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ $themeToggle := resources.Get "js/theme-toggle.js" | minify | fingerprint }}
  <script src="{{ $themeToggle.RelPermalink }}"></script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
