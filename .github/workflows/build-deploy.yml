name: Build and Deploy EOL-CHIP

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Fetch CVEs from NVD
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: python scripts/fetch_cves.py

      - name: Fetch exploits from Exploit-DB
        run: python scripts/fetch_exploits.py

      - name: Fetch FCC device data
        run: python scripts/fetch_fcc.py

      - name: Process EOL chip data
        run: python scripts/process_eol.py

      - name: Build search index
        run: python scripts/build_search_index.py

      - name: Assemble site
        run: |
          mkdir -p _site/src _site/data
          cp index.html cves.html exploits.html eol.html _site/
          cp src/common.js src/main.js src/page-cves.js src/page-exploits.js src/page-eol.js src/style.css _site/src/
          cp data/*.json _site/data/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
