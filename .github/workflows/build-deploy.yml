name: Build and Deploy EOL-CHIP

on:
  # Heavy data refresh runs WEEKLY (Monday 06:00 UTC). Daily was too much
  # traffic against upstream APIs (NVD especially) and added no value —
  # CVEs / advisories / exploits don't move that fast for our scope.
  schedule:
    - cron: '0 6 * * 1'   # weekly: Monday 06:00 UTC
  # Pushes to main re-deploy the site so HTML/CSS/JS changes go live
  # immediately, but the fetcher steps are skipped (see `if:` guards
  # below) — those only run on the schedule or a manual dispatch.
  push:
    branches: [main]
  # Manual trigger: full pipeline including data fetch. Use this when
  # you need a fresh data refresh outside the weekly cadence.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      # ─── Data-fetch steps below only run on the weekly schedule or a
      # ─── manual workflow_dispatch. Pushes (code-only changes) skip these
      # ─── and rebuild the site from the data files already committed.

      - name: Fetch CVEs from NVD
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        continue-on-error: true
        run: python scripts/fetch_cves.py

      - name: Fetch exploits from Exploit-DB
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python scripts/fetch_exploits.py

      - name: Fetch CISA Known Exploited Vulnerabilities
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python scripts/fetch_cisa.py

      - name: Fetch CISA ICS advisories
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python scripts/fetch_ics_advisories.py

      - name: Fetch GitHub Security Advisories
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: python scripts/fetch_ghsa.py

      - name: Fetch Packet Storm
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python scripts/fetch_packetstorm.py

      - name: Fetch OSV.dev (open vulnerabilities)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python scripts/fetch_osv.py

      - name: Fetch NHTSA vehicle recalls
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python scripts/fetch_recalls.py

      - name: Fetch vendor PSIRT advisories
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python scripts/fetch_vendor_psirts.py

      - name: Fetch Metasploit hardware modules
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: python scripts/fetch_metasploit.py

      - name: Fetch lifecycle status from Digi-Key
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true   # best-effort enrichment; never block the deploy
        env:
          DIGIKEY_CLIENT_ID: ${{ secrets.DIGIKEY_CLIENT_ID }}
          DIGIKEY_CLIENT_SECRET: ${{ secrets.DIGIKEY_CLIENT_SECRET }}
        run: python scripts/fetch_lifecycle.py

      - name: Process EOL chip data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/process_eol.py

      - name: Enrich chips with Wikipedia + Wikidata facts
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true   # best-effort enrichment; a failure here must
                                  # NOT abort cross-link + the site deploy
        run: python scripts/fetch_chip_facts.py

      - name: Cross-link CVEs ↔ KEV / Exploit / Metasploit
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/cross_link.py

      - name: Build search index + meta
        run: python scripts/build_search_index.py

      - name: Sanity-check fetched data
        id: sanity
        run: |
          set +e
          warn=""
          for f in cves.json exploits.json cisa_kev.json metasploit.json; do
            count=$(python -c "import json; print(len(json.load(open('data/$f'))))" 2>/dev/null || echo "0")
            echo "$f -> $count items"
            if [ "$count" = "0" ]; then warn="$warn $f"; fi
          done
          if [ -n "$warn" ]; then
            echo "WARNING: empty data files:$warn"
            echo "empty=$warn" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on empty critical fetch
        if: steps.sanity.outputs.empty != ''
        uses: actions/github-script@v7
        with:
          script: |
            const empty = `${{ steps.sanity.outputs.empty }}`.trim();
            if (!empty) return;
            const title = `Data fetch returned 0 results: ${empty}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'data-fetch-alert',
            });
            if (issues.find(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, labels: ['data-fetch-alert'],
              body: `One or more critical data fetches returned 0 items in the last run.\n\n` +
                    `Affected files: \`${empty}\`\n\nSee the run log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Assemble site
        run: |
          mkdir -p _site/src _site/data
          cp *.html _site/
          cp src/*.js src/*.css _site/src/
          cp data/*.json _site/data/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
